name: Build & sign shortcuts

on:
  push:
    branches: [master, main]
    paths-ignore: ['signed/**', 'README.md']
  workflow_dispatch:

permissions:
  contents: write       # so the job can push the signed files back

jobs:
  build-sign-publish:
    runs-on: macos-14        # macOS 14 (Sonoma) — macos-15 has a bug in the `shortcuts` CLI
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build unsigned shortcuts
        run: python3 build.py

      - name: Diagnose & sign shortcuts
        run: |
          mkdir -p signed

          # --- diagnostic info saved to file for debugging ---
          {
            echo "=== shortcuts CLI ==="
            shortcuts --version 2>&1 || true
            echo ""
            echo "=== sign help ==="
            shortcuts sign --help 2>&1 || true
            echo ""
            echo "=== security find-identity ==="
            security find-identity -v -p basic 2>&1 || true
            echo ""
            echo "=== codesign identities ==="
            security find-identity -v -p codesigning 2>&1 || true
            echo ""
            echo "=== default keychain ==="
            security default-keychain 2>&1 || true
            echo ""
            echo "=== list keychains ==="
            security list-keychains 2>&1 || true
            echo ""
            echo "=== Shortcuts app exists ==="
            ls -la /System/Applications/Shortcuts.app 2>&1 || true
            echo ""
            echo "=== Shortcuts system app exists ==="
            ls -la /Applications/Shortcuts.app 2>&1 || true
            echo ""
          } > signed/DEBUG.md

          for f in *.shortcut; do
            echo "=== signing $f ==="
            perl -e 'alarm shift; exec @ARGV' 120 shortcuts sign --mode people-who-know-me \
              --input "$f" --output "signed/$f" 2>"$f.stderr" 1>"$f.stdout" \
              && echo "  ✓ signed $f" \
              || { err=$(cat "$f.stderr"); echo "  WARNING: signing $f failed: $err" \
                   && { echo "--- $f sign stderr ---" >> signed/DEBUG.md
                        cat "$f.stderr" >> signed/DEBUG.md
                        echo "" >> signed/DEBUG.md; } \
                   && cp "$f" "signed/$f"; }
            rm -f "$f.stderr" "$f.stdout"
          done
          ls -la signed/
          cat signed/DEBUG.md

      - name: Write install index
        env:
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          BASE="https://raw.githubusercontent.com/${REPO}/${BRANCH}/signed"
          {
            echo "# Install links"
            echo ""
            echo "To install, tap a link **on your iPhone** with Safari."
            echo ""
            echo "| Shortcut | Install |"
            echo "|----------|---------|"
            for f in signed/*.shortcut; do
              name=$(basename "$f")
              url="${BASE}/${name}"
              enc=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$url")
              echo "| ${name%.shortcut} | [Install](shortcuts://import-shortcut?url=${enc}) |"
            done
            echo ""
            echo "---"
            echo ""
            echo "### If shortcuts won't import"
            echo "1. Open **Settings → Shortcuts**"
            echo "2. Enable **Allow Untrusted Shortcuts**"
            echo "3. Tap install again"
            echo ""
            echo "### Signing locally (optional)"
                echo 'To sign yourself on a Mac: `shortcuts sign --mode anyone -i file.shortcut -o signed/file.shortcut` (anyone mode requires iCloud; people-who-know-me signs locally)'
          } > signed/INSTALL.md
          cat signed/INSTALL.md

      - name: Commit & push signed shortcuts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add signed/
          if git diff --staged --quiet; then
            echo "no changes to signed files"
          else
            git commit -m "ci: rebuild signed shortcuts [skip ci]"
            git push
          fi
