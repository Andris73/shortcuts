name: Build & sign shortcuts

on:
  push:
    branches: [master, main]
    paths-ignore: ['signed/**', 'README.md']
  workflow_dispatch:

permissions:
  contents: write       # so the job can push the signed files back

jobs:
  build-sign-publish:
    runs-on: macos-14        # macOS 14 (Sonoma) — macos-15 has a bug in the `shortcuts` CLI
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build unsigned shortcuts
        run: python3 build.py

      - name: Sign shortcuts (try, then fall back to unsigned)
        run: |
          mkdir -p signed
          for f in *.shortcut; do
            echo "signing $f"
            perl -e 'alarm shift; exec @ARGV' 120 shortcuts sign --mode people-who-know-me --input "$f" --output "signed/$f" \
              && echo "  ✓ signed $f" \
              || { echo "  WARNING: signing $f failed — using unsigned fallback" \
                   && cp "$f" "signed/$f"; }
          done
          ls -la signed/

      - name: Write install index
        env:
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          BASE="https://raw.githubusercontent.com/${REPO}/${BRANCH}/signed"
          {
            echo "# Install links"
            echo ""
            echo "To install, tap a link **on your iPhone** with Safari."
            echo ""
            echo "| Shortcut | Install |"
            echo "|----------|---------|"
            for f in signed/*.shortcut; do
              name=$(basename "$f")
              url="${BASE}/${name}"
              enc=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$url")
              echo "| ${name%.shortcut} | [Install](shortcuts://import-shortcut?url=${enc}) |"
            done
            echo ""
            echo "---"
            echo ""
            echo "### If shortcuts won't import"
            echo "1. Open **Settings → Shortcuts**"
            echo "2. Enable **Allow Untrusted Shortcuts**"
            echo "3. Tap install again"
            echo ""
            echo "### Signing locally (optional)"
                echo 'To sign yourself on a Mac: `shortcuts sign --mode anyone -i file.shortcut -o signed/file.shortcut` (anyone mode requires iCloud; people-who-know-me signs locally)'
          } > signed/INSTALL.md
          cat signed/INSTALL.md

      - name: Commit & push signed shortcuts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add signed/
          if git diff --staged --quiet; then
            echo "no changes to signed files"
          else
            git commit -m "ci: rebuild signed shortcuts [skip ci]"
            git push
          fi
